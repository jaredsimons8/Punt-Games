name: Daily Lineup Collection

on:
  schedule:
    # 9am UTC = 5am ET (catches all west coast games that finished by midnight)
    - cron: '0 9 * * *'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run lineup collector
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/collect-lineups.js

      - name: Log completion
        run: echo "Lineup collection complete at $(date -u)"
